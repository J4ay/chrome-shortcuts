<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Chrome Shortcuts</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="" />
        <script src="popup.js"></script>
    </head>

    <body
        style="
            min-width: 400px;
            min-height: 450px;
            padding: 20px;
            font-family: monospace;
            align-items: center;
            display: flex;
            flex-direction: column;
            font-size: larger;
        "
    >
        <container>
            <h1>Edit Shortcuts</h1>
            <h3>Shortcut 1</h3>
            <input
                type="text"
                id="shortcut1"
                placeholder="Shortcut 1 URL"
                style="margin: 10px 0"
            />
            <br />
            <h3>Shortcut 2</h3>
            <input
                type="text"
                id="shortcut2"
                placeholder="Shortcut 2 URL"
                style="margin: 10px 0"
            />
            <br />
            <h3>Shortcut 3</h3>
            <input
                type="text"
                id="shortcut3"
                placeholder="Shortcut 3 URL"
                style="margin-top: 10px; margin-bottom: 20px"
            />
            <br />
            <button id="saveBtn" style="margin: 10px 0">Save Shortcuts</button>

            <button id="clearBtn" style="margin: 10px 0">
                Clear Shortcuts
            </button>
            <div id="status" style="margin-top: 20px"></div>
        </container>
    </body>
</html>
