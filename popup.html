<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Chrome Shortcuts</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="" />
        <script src="popup.js"></script>
    </head>

    <body
        style="
            min-width: 280px;
            min-height: 400px;
            font-family: monospace;
            align-items: center;
            display: flex;
            flex-direction: column;
            font-size: larger;
        "
    >
        <container>
            <h2>Edit Shortcuts</h2>

            <h3 style="margin-bottom: 15px;">Shortcut 1</h3>
            <input
                type="text"
                id="shortcut1"
                placeholder="Shortcut 1 URL"
            />
            <br />

            <h3 style="margin-bottom: 15px;">Shortcut 2</h3>
            <input
                type="text"
                id="shortcut2"
                placeholder="Shortcut 2 URL"
            />
            <br />

            <h3 style="margin-bottom: 15px;">Shortcut 3</h3>
            <input
                type="text"
                id="shortcut3"
                placeholder="Shortcut 3 URL"
                style="margin-bottom: 15px"
            />
            <br />

            <button id="saveBtn" style="margin: 10px 0">Save</button>
            <button id="clearBtn" style="margin: 10px 0">Clear</button>
            <br />

            <input type="checkbox" id="openInNewTab" style="margin: 10px 0 15px 0" />
            <label for="openInNewTab">Open in new tab</label>
            
            <div id="status"></div>

        </container>
    </body>
</html>
